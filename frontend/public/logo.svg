<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Kangaroo body -->
  <ellipse cx="45" cy="55" rx="22" ry="28" fill="#D97746"/>
  
  <!-- Kangaroo head -->
  <ellipse cx="58" cy="28" rx="16" ry="14" fill="#D97746"/>
  
  <!-- Ear left -->
  <ellipse cx="48" cy="12" rx="5" ry="10" fill="#D97746"/>
  <ellipse cx="48" cy="12" rx="3" ry="7" fill="#E8A87C"/>
  
  <!-- Ear right -->
  <ellipse cx="62" cy="10" rx="5" ry="10" fill="#D97746"/>
  <ellipse cx="62" cy="10" rx="3" ry="7" fill="#E8A87C"/>
  
  <!-- Eye -->
  <circle cx="62" cy="26" r="4" fill="#1A1D1A"/>
  <circle cx="63" cy="25" r="1.5" fill="white"/>
  
  <!-- Nose -->
  <ellipse cx="72" cy="30" rx="4" ry="3" fill="#8B4513"/>
  
  <!-- Snout -->
  <ellipse cx="68" cy="32" rx="8" ry="6" fill="#E8A87C"/>
  
  <!-- Smile -->
  <path d="M65 36 Q68 40 72 36" stroke="#1A1D1A" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  
  <!-- Front leg -->
  <ellipse cx="55" cy="70" rx="6" ry="10" fill="#D97746"/>
  
  <!-- Back leg (big) -->
  <ellipse cx="32" cy="75" rx="10" ry="8" fill="#D97746"/>
  <ellipse cx="22" cy="78" rx="8" ry="5" fill="#D97746"/>
  
  <!-- Tail -->
  <path d="M25 50 Q5 60 15 80" stroke="#D97746" stroke-width="8" fill="none" stroke-linecap="round"/>
  
  <!-- Pouch with food bag -->
  <ellipse cx="52" cy="60" rx="10" ry="8" fill="#E8A87C"/>
  <rect x="46" y="54" width="12" height="10" rx="2" fill="#1E3F20"/>
  <rect x="48" y="52" width="8" height="3" rx="1" fill="#2D5A30"/>
  
  <!-- Speed lines -->
  <path d="M80 45 L95 45" stroke="#1E3F20" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <path d="M82 52 L92 52" stroke="#1E3F20" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <path d="M80 59 L90 59" stroke="#1E3F20" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
</svg>
