<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 280" fill="none">
  <!-- Shield Outer Border - Blue Gradient -->
  <path d="M100 10 L180 35 L180 110 C180 170 140 210 100 240 C60 210 20 170 20 110 L20 35 Z" 
        stroke="url(#shieldGradient)" stroke-width="6" fill="none"/>
  
  <!-- Shield Inner Fill - Dark Blue -->
  <path d="M100 25 L165 45 L165 105 C165 155 135 190 100 215 C65 190 35 155 35 105 L35 45 Z" 
        fill="url(#innerGradient)"/>
  
  <!-- Eye White Part (Sclera) - Curved shape -->
  <ellipse cx="100" cy="110" rx="45" ry="30" fill="#e8eef5" opacity="0.9"/>
  
  <!-- Eye Blue Swirl/Iris - Main blue part -->
  <path d="M100 80 C130 80 150 100 145 125 C140 145 120 155 100 150 C75 145 60 120 70 95 C75 82 88 80 100 80Z" 
        fill="url(#eyeGradient)"/>
  
  <!-- Eye Pupil - Dark circle -->
  <circle cx="105" cy="115" r="22" fill="#0a1628"/>
  
  <!-- Checkmark inside pupil -->
  <path d="M92 115 L102 125 L120 105" 
        stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  
  <!-- Eye highlight -->
  <circle cx="115" cy="105" r="5" fill="white" opacity="0.6"/>
  
  <!-- Text: Check (white) -->
  <text x="28" y="265" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="white">Check</text>
  
  <!-- Text: Kids (blue) -->
  <text x="108" y="265" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#3b82f6">Kids</text>
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <linearGradient id="innerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="eyeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
</svg>